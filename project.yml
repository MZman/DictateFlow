name: DictateFlow
options:
  minimumXcodeGenVersion: 2.38.0
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.mesutoezciftci.DictateFlow
    SWIFT_VERSION: 5.10
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0
    GENERATE_INFOPLIST_FILE: NO
    INFOPLIST_FILE: DictateFlow/Resources/Info.plist
    MACOSX_DEPLOYMENT_TARGET: 14.0
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ENABLE_HARDENED_RUNTIME: YES
targets:
  DictateFlow:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: DictateFlow/DictateFlowApp.swift
      - path: DictateFlow/Views
      - path: DictateFlow/Models
      - path: DictateFlow/Managers
      - path: DictateFlow/Helpers
      - path: DictateFlow/Resources
        excludes:
          - Info.plist
          - DictateFlow.entitlements
        buildPhase: resources
    settings:
      base:
        PRODUCT_NAME: DictateFlow
        CODE_SIGN_ENTITLEMENTS: DictateFlow/Resources/DictateFlow.entitlements
        OTHER_LDFLAGS:
          - "$(inherited)"
          - "-lsqlite3"
    scheme:
      gatherCoverageData: false
      environmentVariables: {}
